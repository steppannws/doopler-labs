  :root{
    --celeste:#75AADB;
    --celeste-deep:#5C93C7;
    --blanco:#FFFFFF;
    --tinta:#1A1A1A;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--celeste);
    font-family:'Inter',sans-serif;
    color:var(--tinta);
    -webkit-font-smoothing:antialiased;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:6vh 5vw;
    gap:28px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    font-weight:600;
    color:rgba(255,255,255,0.85);
  }
  .stage{
    width:100%;
    max-width:640px;
    aspect-ratio:1/1;
    background:var(--blanco);
    border-radius:4px;
    box-shadow:0 30px 60px -20px rgba(15,40,70,0.45);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:9%;
    position:relative;
  }
  #texto{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    resize:none;
    background:transparent;
    text-align:center;
    font-family:'Malvinas Sans', cursive;
    color:var(--tinta);
    line-height:1.15;
    text-transform:uppercase;
    caret-color:var(--celeste-deep);
    overflow:hidden;
    white-space:pre-wrap;
    word-break:keep-all;
    overflow-wrap:normal;
  }
  #texto::placeholder{
    color:#c9c9c9;
    font-family:'Malvinas Sans', cursive;
    text-transform:none;
  }
  .handle{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:12px;
    letter-spacing:0.02em;
    color:rgba(255,255,255,0.75);
    text-decoration:none;
  }
  .handle:hover{
    color:#ffffff;
  }
  .controls{
    display:flex;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
    justify-content:center;
  }
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:0.02em;
    padding:12px 22px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease;
  }
  #descargar{
    background:var(--tinta);
    color:var(--blanco);
  }
  #descargar:hover{ transform:translateY(-1px); }
  #descargar:active{ transform:translateY(0); }
  #descargar:disabled{
    opacity:0.5;
    cursor:default;
    transform:none;
  }
  .size-row{
    display:flex;
    align-items:center;
    gap:10px;
    color:rgba(255,255,255,0.9);
    font-size:13px;
  }
  input[type="range"]{
    accent-color:var(--tinta);
  }
  footer{
    font-size:12px;
    color:rgba(255,255,255,0.6);
    text-align:center;
  }
  @media (max-width:480px){
    .stage{ padding:11%; }
  }
</style>
</head>
<body>

  <div class="eyebrow">Generador de posteos</div>

  <div class="stage" id="stage">
    <textarea id="texto" placeholder="Escribí tu frase" rows="3" maxlength="140"></textarea>
  </div>

  <div class="controls">
    <div class="size-row">
      <span>Tamaño</span>
      <input type="range" id="tamano" min="24" max="90" value="56">
    </div>
    <button id="descargar">Descargar imagen</button>
  </div>

  <footer>Tocá el espacio blanco y escribí — el post se genera solo.</footer>
  <a class="handle" href="https://www.instagram.com/casa_doopler" target="_blank" rel="noopener">@casa_doopler</a>

<script>
  const texto = document.getElementById('texto');
  const tamano = document.getElementById('tamano');
  const stage = document.getElementById('stage');
  const btn = document.getElementById('descargar');

  function ajustarTamano(){
    texto.style.fontSize = tamano.value + 'px';
  }
  tamano.addEventListener('input', ajustarTamano);
  ajustarTamano();

  // auto-shrink si el texto no entra
  function autoFit(){
    let size = parseInt(tamano.value, 10);
    texto.style.fontSize = size + 'px';
    let guard = 0;
    while (
      (texto.scrollHeight > texto.clientHeight + 1 || texto.scrollWidth > texto.clientWidth + 1)
      && size > 12 && guard < 80
    ){
      size -= 2;
      texto.style.fontSize = size + 'px';
      guard++;
    }
  }
  texto.addEventListener('input', autoFit);
  window.addEventListener('resize', autoFit);

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.textContent = 'Generando…';
    try {
      const canvas = await html2canvas(stage, { scale: 3, backgroundColor: '#ffffff' });
      const link = document.createElement('a');
      link.download = 'post.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } finally {
      btn.disabled = false;
      btn.textContent = 'Descargar imagen';
    }
  });

  texto.focus();
</script>
</body>
</html>
